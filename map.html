<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOFO — Live Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --card: rgba(16,26,42,0.92);
  --border: rgba(255,255,255,0.1);
  --blue: #60A5FA; --bdim: rgba(96,165,250,0.16); --bbright: rgba(96,165,250,0.28);
  --red: #FF6B6B;  --rdim: rgba(255,107,107,0.16);
  --green: #34D399; --gdim: rgba(52,211,153,0.15);
  --yellow: #F59E0B;
  --text: #e8f0f0; --muted: #6b9090; --muted2: #4a6868;
}
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', -apple-system, sans-serif; }
#map { width: 100%; height: 100vh; }

/* ── Loading / No-auth ── */
#map-loading, #no-auth {
  position: absolute; inset: 0; z-index: 3000;
  background: #111c2b;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#no-auth { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(96,165,250,0.15); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--muted); }
.auth-icon { font-size: 48px; }
.auth-title { font-size: 20px; font-weight: 700; color: #fff; }
.auth-link {
  margin-top: 4px; padding: 11px 28px;
  background: linear-gradient(135deg, #4B9EF5, #1d6fd8);
  border-radius: 10px; color: #fff; text-decoration: none;
  font-weight: 700; font-size: 14px;
}

/* ── Floating Header ── */
#map-header {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 1000; display: none;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; backdrop-filter: blur(22px);
  padding: 11px 20px; align-items: center; gap: 18px;
  white-space: nowrap; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.mh-logo { display: flex; align-items: center; gap: 8px; }
.mh-logo-text { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; letter-spacing: 0.5px; color: #fff; }
.mh-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--muted); text-transform: uppercase; }
.mh-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.mh-stat { display: flex; align-items: center; gap: 6px; }
.mh-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.mh-val { font-size: 14px; font-weight: 700; color: #fff; }
.mh-lbl { font-size: 11px; color: var(--muted); }
#mh-refresh-txt { font-size: 11px; color: var(--muted); }
.mh-btn {
  padding: 6px 13px; border-radius: 8px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.07); color: var(--text);
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
  display: flex; align-items: center; gap: 5px;
}
.mh-btn:hover { background: rgba(255,255,255,0.13); }
.mh-btn-blue { color: var(--blue); border-color: rgba(96,165,250,0.3); }
.mh-btn-blue:hover { background: var(--bdim); }

/* ── Legend ── */
#map-legend {
  position: absolute; bottom: 30px; left: 20px;
  z-index: 1000; display: none;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; backdrop-filter: blur(22px);
  padding: 16px 18px; min-width: 190px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.leg-title { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 13px; }
.leg-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
.leg-left { display: flex; align-items: center; gap: 9px; }
.leg-dot-b {
  width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0;
  background: var(--blue); box-shadow: 0 0 7px rgba(96,165,250,0.65);
}
.leg-dot-r {
  width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0;
  background: var(--red); box-shadow: 0 0 7px rgba(255,107,107,0.65);
  position: relative;
}
.leg-dot-r::after {
  content: '';
  position: absolute; inset: -4px; border-radius: 50%;
  border: 1.5px solid rgba(255,107,107,0.45);
  animation: leg-pulse 2s ease-out infinite;
}
@keyframes leg-pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
.leg-name { font-size: 13px; color: var(--text); font-weight: 500; }
.leg-sub { font-size: 11px; color: var(--muted2); margin-top: -1px; }
.leg-count { font-size: 14px; font-weight: 800; color: #fff; }
.leg-divider { height: 1px; background: var(--border); margin: 10px 0; }
.leg-note { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ── Stats strip (bottom-right) ── */
#map-stats {
  position: absolute; bottom: 30px; right: 20px;
  z-index: 1000; display: none;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; backdrop-filter: blur(22px);
  padding: 14px 18px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.stats-title { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }
.stats-row { display: flex; gap: 20px; }
.stat-block { text-align: center; }
.stat-block .sb-val { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -1px; line-height: 1; }
.stat-block .sb-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }
.sb-blue { color: var(--blue) !important; }
.sb-red  { color: var(--red)  !important; }

/* ── Custom markers ── */
.lf-wrap { display: flex; align-items: center; justify-content: center; position: relative; }
.lf-marker {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; position: relative; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.lf-marker:hover { transform: scale(1.2); }
.lf-finder {
  background: rgba(75,158,245,0.9);
  border: 2.5px solid #60A5FA;
  box-shadow: 0 0 14px rgba(96,165,250,0.6), 0 3px 10px rgba(0,0,0,0.45);
}
.lf-loser {
  background: rgba(255,107,107,0.9);
  border: 2.5px solid #FF6B6B;
  box-shadow: 0 0 14px rgba(255,107,107,0.6), 0 3px 10px rgba(0,0,0,0.45);
}
/* Pulsing ring on loser markers — they're actively searching */
.lf-pulse {
  position: absolute; width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid rgba(255,107,107,0.65);
  animation: lf-pulse-anim 2.2s ease-out infinite;
  pointer-events: none;
}
@keyframes lf-pulse-anim { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(2.8); opacity: 0; } }

/* ── Popup overrides ── */
.leaflet-popup-content-wrapper {
  background: rgba(14,24,38,0.96) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  border-radius: 16px !important;
  backdrop-filter: blur(24px) !important;
  color: var(--text) !important;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; width: auto !important; min-width: 0 !important; }
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button {
  color: var(--muted) !important; font-size: 20px !important;
  top: 9px !important; right: 12px !important; z-index: 1; line-height: 1 !important;
}
.leaflet-popup-close-button:hover { color: var(--text) !important; background: transparent !important; }
.map-popup {
  padding: 18px 20px 16px; min-width: 230px; max-width: 290px;
  font-family: 'DM Sans', sans-serif;
}
.popup-badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 9px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; margin-bottom: 10px;
}
.pb-finder { background: var(--bdim); color: var(--blue); }
.pb-loser  { background: var(--rdim); color: var(--red); }
.popup-photo {
  width: 100%; height: 140px; object-fit: cover; border-radius: 10px;
  margin-bottom: 12px; display: block; cursor: pointer;
}
.popup-item {
  font-size: 18px; font-weight: 800; color: #fff;
  text-transform: capitalize; margin-bottom: 3px; letter-spacing: -0.4px;
}
.popup-desc { font-size: 12px; color: var(--muted); text-transform: capitalize; margin-bottom: 6px; line-height: 1.4; }
.popup-features { font-size: 11px; color: var(--muted2); margin-bottom: 10px; font-style: italic; }
.popup-divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 9px; }
.popup-meta-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.popup-meta-icon { font-size: 12px; }
.popup-meta-text { font-size: 12px; color: var(--muted); }
.popup-id { font-size: 10px; color: rgba(255,255,255,0.18); font-family: 'Courier New', monospace; margin-top: 6px; }

/* ── Tooltip overrides ── */
.lf-tt {
  background: rgba(14,24,38,0.94) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  border-radius: 8px !important; color: var(--text) !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 12px !important; font-weight: 600 !important;
  box-shadow: 0 4px 18px rgba(0,0,0,0.45) !important;
  padding: 5px 11px !important; white-space: nowrap;
}
.lf-tt::before { display: none !important; }

/* ── Override MarkerCluster default circles ── */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background: transparent !important; }
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background: transparent !important; }

/* Leaflet zoom control */
.leaflet-control-zoom a {
  background: var(--card) !important; color: var(--text) !important;
  border: 1px solid var(--border) !important; backdrop-filter: blur(12px);
}
.leaflet-control-zoom a:hover { background: rgba(255,255,255,0.12) !important; }
.leaflet-bar { border: none !important; box-shadow: 0 4px 20px rgba(0,0,0,0.45) !important; border-radius: 10px !important; overflow: hidden; }
.leaflet-bar a:first-child { border-radius: 10px 10px 0 0 !important; }
.leaflet-bar a:last-child  { border-radius: 0 0 10px 10px !important; }

/* Attribution */
.leaflet-control-attribution { background: rgba(14,24,38,0.7) !important; color: var(--muted) !important; font-size: 10px !important; border-radius: 6px 0 0 0 !important; }
.leaflet-control-attribution a { color: var(--muted) !important; }
</style>
</head>
<body>

<!-- Loading -->
<div id="map-loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading map data…</div>
</div>

<!-- No auth -->
<div id="no-auth">
  <div class="auth-icon">🔒</div>
  <div class="auth-title" style="font-family:'DM Sans',sans-serif">Admin access required</div>
  <a href="/admin" class="auth-link">Go to Admin Login →</a>
</div>

<!-- Header -->
<div id="map-header">
  <div class="mh-logo">
    <span class="mh-logo-text">LOFO</span>
  </div>
  <div class="mh-label">Live Map</div>
  <div class="mh-divider"></div>
  <div class="mh-stat">
    <div class="mh-dot" style="background:var(--blue);box-shadow:0 0 6px rgba(96,165,250,0.7)"></div>
    <span class="mh-val" id="hdr-finders">—</span>
    <span class="mh-lbl">finders</span>
  </div>
  <div class="mh-stat">
    <div class="mh-dot" style="background:var(--red);box-shadow:0 0 6px rgba(255,107,107,0.7)"></div>
    <span class="mh-val" id="hdr-losers">—</span>
    <span class="mh-lbl">losers</span>
  </div>
  <div class="mh-divider"></div>
  <span id="mh-refresh-txt">—</span>
  <button class="mh-btn mh-btn-blue" onclick="refreshMap()">↻ Refresh</button>
  <a href="/admin" class="mh-btn">← Admin</a>
</div>

<!-- Legend -->
<div id="map-legend">
  <div class="leg-title">Legend</div>
  <div class="leg-row">
    <div class="leg-left">
      <div class="leg-dot-b"></div>
      <div>
        <div class="leg-name">Finder</div>
        <div class="leg-sub">Found something</div>
      </div>
    </div>
    <span class="leg-count" id="leg-finders">—</span>
  </div>
  <div class="leg-row">
    <div class="leg-left">
      <div class="leg-dot-r"></div>
      <div>
        <div class="leg-name">Loser</div>
        <div class="leg-sub">Looking for something</div>
      </div>
    </div>
    <span class="leg-count" id="leg-losers">—</span>
  </div>
  <div class="leg-divider"></div>
  <div class="leg-note" id="leg-no-gps"></div>
</div>

<!-- Stats strip (bottom-right) -->
<div id="map-stats">
  <div class="stats-title">On Map Now</div>
  <div class="stats-row">
    <div class="stat-block">
      <div class="sb-val sb-blue" id="st-finders">—</div>
      <div class="sb-lbl">finders</div>
    </div>
    <div class="stat-block">
      <div class="sb-val sb-red" id="st-losers">—</div>
      <div class="sb-lbl">losers</div>
    </div>
    <div class="stat-block">
      <div class="sb-val" id="st-total">—</div>
      <div class="sb-lbl">total pins</div>
    </div>
  </div>
</div>

<!-- Map -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ── Auth check ──
const token = sessionStorage.getItem('lofo_admin_token');
if (!token) {
  document.getElementById('map-loading').style.display = 'none';
  document.getElementById('no-auth').style.display = 'flex';
} else {
  initMap();
}

let map, clusters;
let allPins = [];

// ── Init Leaflet ──
function initMap() {
  map = L.map('map', {
    zoomControl: false,
    preferCanvas: true,
  });

  // CartoDB Dark Matter tiles — no API key needed
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  clusters = L.markerClusterGroup({
    maxClusterRadius: 56,
    iconCreateFunction: clusterIcon,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
  });
  map.addLayer(clusters);

  loadPins();
}

// ── Load data ──
let _retryCount = 0;
const _MAX_RETRIES = 4; // ~80s total before giving up

async function loadPins() {
  const lt = document.querySelector('.loading-text');

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000); // 20s per attempt

    if (_retryCount === 0 && lt) lt.textContent = 'Loading map data…';

    const res = await fetch('/admin/map-pins', {
      headers: { 'Authorization': `Bearer ${token}` },
      signal: controller.signal,
    });
    clearTimeout(timeout);

    if (res.status === 401) { window.location.href = '/admin'; return; }
    if (!res.ok) throw new Error(`Server returned ${res.status}`);

    _retryCount = 0;
    const data = await res.json();
    allPins = data.pins || [];
    renderPins(allPins);
    updateUI(data);
  } catch (e) {
    console.warn(`Map load attempt ${_retryCount + 1} failed:`, e.message);

    if (_retryCount < _MAX_RETRIES) {
      _retryCount++;
      const elapsed = _retryCount * 20;
      if (lt) lt.textContent = `Server waking up… retrying (${elapsed}s)`;
      setTimeout(loadPins, 3000); // wait 3s then retry
    } else {
      // All retries exhausted — show manual retry option
      document.getElementById('map-loading').innerHTML = `
        <div style="text-align:center;font-family:'DM Sans',sans-serif;padding:32px;max-width:320px">
          <div style="font-size:36px;margin-bottom:14px">⚠️</div>
          <div style="font-size:16px;font-weight:700;color:#e8f0f0;margin-bottom:6px">Server took too long</div>
          <div style="font-size:13px;color:#6b9090;margin-bottom:24px">Railway may still be starting up. Try again in a moment.</div>
          <button onclick="_retryCount=0;loadPins();document.getElementById('map-loading').innerHTML='<div class=spinner></div><div class=loading-text>Retrying…</div>'" style="
            padding:11px 28px;background:linear-gradient(135deg,#4B9EF5,#1d6fd8);
            border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;
            font-family:'DM Sans',sans-serif;cursor:pointer">
            Try Again
          </button>
          <div style="margin-top:14px"><a href="/admin" style="font-size:12px;color:#6b9090;text-decoration:none">← Back to Admin</a></div>
        </div>`;
    }
  }
}

function updateUI(data) {
  const fCount = allPins.filter(p => p.type === 'finder').length;
  const lCount = allPins.filter(p => p.type === 'loser').length;
  const total  = fCount + lCount;

  ['hdr-finders','leg-finders','st-finders'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = fCount;
  });
  ['hdr-losers','leg-losers','st-losers'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = lCount;
  });
  document.getElementById('st-total').textContent = total;
  document.getElementById('mh-refresh-txt').textContent =
    `Updated ${new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;

  const noGps = data.no_gps_count || 0;
  document.getElementById('leg-no-gps').textContent =
    noGps > 0 ? `${noGps} item${noGps > 1 ? 's' : ''} without GPS not shown` : 'All active items have GPS';

  document.getElementById('map-loading').style.display = 'none';
  document.getElementById('map-header').style.display = 'flex';
  document.getElementById('map-legend').style.display = 'block';
  document.getElementById('map-stats').style.display = 'block';
}

// ── Render pins ──
function renderPins(pins) {
  clusters.clearLayers();
  if (!pins.length) {
    map.setView([39.5, -98.35], 4);
    return;
  }

  const markers = pins.map(item => {
    const isLoser = item.type === 'loser';
    const icon = L.divIcon({
      html: `<div class="lf-wrap">
        ${isLoser ? '<div class="lf-pulse"></div>' : ''}
        <div class="lf-marker ${isLoser ? 'lf-loser' : 'lf-finder'}">
          ${isLoser ? '📦' : '🔍'}
        </div>
      </div>`,
      className: '',
      iconSize: [44, 44],
      iconAnchor: [22, 22],
      popupAnchor: [0, -24],
    });

    const marker = L.marker([+item.latitude, +item.longitude], { icon });
    marker._itemData = item;

    // Hover tooltip
    marker.bindTooltip(cap(item.item_type || 'item'), {
      className: 'lf-tt',
      direction: 'top',
      offset: [0, -6],
    });

    // Click popup
    marker.bindPopup(buildPopup(item), {
      maxWidth: 310,
      className: 'lf-popup',
    });

    return marker;
  });

  clusters.addLayers(markers);

  // Fit to all pins with padding
  const bounds = clusters.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding: [72, 72], maxZoom: 14, animate: true });
  }
}

// ── Popup HTML ──
function buildPopup(item) {
  const colors   = (item.color || []).map(cap).join(', ');
  const attrs    = [colors, cap(item.material), cap(item.size)].filter(Boolean).join(' · ');
  const features = (item.features || []).slice(0, 3).map(cap).join(', ');
  const verb     = item.type === 'finder' ? 'Found' : 'Lost';
  const photo    = item.photo_url
    ? `<img class="popup-photo" src="${item.photo_url}" onclick="window.open('${item.photo_url}','_blank')" />`
    : '';

  return `<div class="map-popup">
    <div class="popup-badge ${item.type === 'finder' ? 'pb-finder' : 'pb-loser'}">${item.type === 'finder' ? 'FINDER' : 'LOSER'}</div>
    ${photo}
    <div class="popup-item">${cap(item.item_type) || 'Item'}</div>
    ${attrs    ? `<div class="popup-desc">${attrs}</div>` : ''}
    ${features ? `<div class="popup-features">${features}</div>` : ''}
    <div class="popup-divider"></div>
    <div class="popup-meta-row">
      <span class="popup-meta-icon">🕐</span>
      <span class="popup-meta-text">${verb} ${timeAgo(item.created_at)}</span>
    </div>
    <div class="popup-meta-row">
      <span class="popup-meta-icon">📍</span>
      <span class="popup-meta-text">${(+item.latitude).toFixed(4)}, ${(+item.longitude).toFixed(4)}</span>
    </div>
    ${item.has_phone ? `<div class="popup-meta-row"><span class="popup-meta-icon">📱</span><span class="popup-meta-text" style="color:#34D399">Contact available</span></div>` : ''}
    <div class="popup-id">${item.id}</div>
  </div>`;
}

// ── Cluster icon ──
function clusterIcon(cluster) {
  const children = cluster.getAllChildMarkers();
  const fCount   = children.filter(m => m._itemData?.type === 'finder').length;
  const lCount   = children.filter(m => m._itemData?.type === 'loser').length;
  const count    = cluster.getChildCount();
  const isFinder = fCount >= lCount;
  const color    = isFinder ? '#60A5FA' : '#FF6B6B';
  const rgb      = isFinder ? '96,165,250' : '255,107,107';
  const size     = count < 5 ? 38 : count < 20 ? 46 : count < 100 ? 54 : 62;
  const fs       = size < 44 ? 12 : 14;

  return L.divIcon({
    html: `<div style="
      width:${size}px; height:${size}px;
      background: rgba(${rgb},0.16);
      border: 2px solid ${color};
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: ${fs}px; font-weight: 800; color: ${color};
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 0 22px rgba(${rgb},0.4), 0 4px 14px rgba(0,0,0,0.5);
      letter-spacing: -0.5px;
    ">${count}</div>`,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
  });
}

// ── Refresh ──
async function refreshMap() {
  if (clusters) clusters.clearLayers();
  document.getElementById('mh-refresh-txt').textContent = 'Refreshing…';
  await loadPins();
}

// ── Helpers ──
function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : s; }

function timeAgo(iso) {
  if (!iso) return '—';
  const ms = Date.now() - new Date(iso);
  const m  = Math.floor(ms / 60000);
  if (m < 1)   return 'just now';
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 7)   return `${d}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
